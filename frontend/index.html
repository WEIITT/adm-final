<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Gestão de Tarefas</title>
  <style>
    body { font-family: Arial; background: #f4f4f4; margin: 40px; }
    section { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
    input, button { padding: 10px; margin: 5px; }
    .task, .notification { background: #eee; padding: 10px; margin-top: 10px; border-radius: 5px; }
  </style>
</head>
<body>

<h1>Sistema de Gestão de Tarefas</h1>

<section>
  <h2>Criar Utilizador</h2>
  <input id="name" placeholder="Nome">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="createUser()">Criar</button>
</section>

<section>
  <h2>Login</h2>
  <input id="loginEmail" placeholder="Email">
  <input id="loginPassword" type="password" placeholder="Password">
  <button onclick="login()">Entrar</button>
  <p id="loginResult"></p>
</section>

<section>
  <h2>Criar Tarefa</h2>
  <input id="userId" placeholder="User ID">
  <input id="title" placeholder="Título">
  <input id="description" placeholder="Descrição">
  <input id="deadline" type="date">
  <button onclick="createTask()">Criar Tarefa</button>
</section>

<section>
  <h2>Listar Tarefas</h2>
  <input id="listUserId" placeholder="User ID">
  <button onclick="listTasks()">Listar</button>
  <div id="tasks"></div>
</section>

<section>
  <h2>Notificações</h2>
  <input id="notificationUserId" placeholder="User ID">
  <button onclick="getNotifications()">Ver Notificações</button>
  <div id="notifications"></div>
</section>

<script>
const API = "http://localhost:3000";

async function createUser() {
  const data = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    password: document.getElementById("password").value
  };

  const res = await fetch(`${API}/users`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  const result = await res.json();
  alert("Utilizador criado: " + JSON.stringify(result));
}

async function login() {
  const data = {
    email: document.getElementById("loginEmail").value,
    password: document.getElementById("loginPassword").value
  };

  const res = await fetch(`${API}/login`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  const result = await res.json();
  document.getElementById("loginResult").innerText = JSON.stringify(result);
}

async function createTask() {
  const data = {
    userId: document.getElementById("userId").value,
    title: document.getElementById("title").value,
    description: document.getElementById("description").value,
    deadline: document.getElementById("deadline").value,
    status: "pending"
  };

  const res = await fetch(`${API}/tasks`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  const result = await res.json();
  alert("Tarefa criada: " + JSON.stringify(result));
}

async function listTasks() {
  const userId = document.getElementById("listUserId").value;
  const res = await fetch(`${API}/tasks/user/${userId}`);
  const tasks = await res.json();

  const div = document.getElementById("tasks");
  div.innerHTML = "";

  tasks.forEach(task => {
    div.innerHTML += `
      <div class="task">
        <strong>${task.title}</strong><br>
        ${task.description}<br>
        Estado: ${task.status}<br>
        Prazo: ${task.deadline}
      </div>
    `;
  });
}

async function getNotifications() {
  const userId = document.getElementById("notificationUserId").value;
  const res = await fetch(`${API}/notifications/${userId}`);
  const notifications = await res.json();

  const div = document.getElementById("notifications");
  div.innerHTML = "";

  notifications.forEach(n => {
    div.innerHTML += `
      <div class="notification">
        ${n.message}
      </div>
    `;
  });
}
</script>

</body>
</html>
