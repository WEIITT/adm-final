<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Gestão de Tarefas</title>
  <style>
    body { font-family: Arial; background: #f4f4f4; margin: 40px; }
    section { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
    input, button { padding: 10px; margin: 5px; }
    .task, .notification { background: #eee; padding: 10px; margin-top: 10px; border-radius: 5px; }
  </style>
</head>
<body>

<h1>Sistema de Gestão de Tarefas</h1>

<section>
  <h2>Criar Utilizador</h2>
  <input id="name" placeholder="Nome">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="createUser()">Criar</button>
</section>

<section>
  <h2>Login</h2>
  <input id="loginEmail" placeholder="Email">
  <input id="loginPassword" type="password" placeholder="Password">
  <button onclick="login()">Entrar</button>
  <p id="loginResult"></p>
</section>

<section>
  <h2>Criar Tarefa</h2>
  <input id="userId" placeholder="User ID">
  <input id="title" placeholder="Título">
  <input id="description" placeholder="Descrição">
  <input id="deadline" type="date">
  <button onclick="createTask()">Criar Tarefa</button>
</section>

<section>
  <h2>Listar Tarefas</h2>
  <button onclick="listTasks()">Listar Tarefas</button>
  <div id="tasks"></div>
</section>

<section>
  <h2>Eliminar Utilizador</h2>
  <input id="deleteUserId" placeholder="User ID">
  <button onclick="deleteUser()">Eliminar Utilizador</button>
</section>

<section>
  <h2>Notificações</h2>
  <input id="notificationUserId" placeholder="User ID">
  <button onclick="getNotifications()">Ver Notificações</button>
  <div id="notifications"></div>
</section>

<script>
const API = "http://192.168.1.165:3000/api";
const BASE = "http://192.168.1.165:3000";
let token = "";

async function createUser() {
  const data = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    password: document.getElementById("password").value
  };

  const res = await fetch(`${API}/register`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  const result = await res.json();
  alert("Utilizador criado: " + JSON.stringify(result));
}

async function login() {
  const data = {
    email: document.getElementById("loginEmail").value,
    password: document.getElementById("loginPassword").value
  };

  const res = await fetch(`${API}/login`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  const result = await res.json();

  if (result.token) {
    token = result.token;

    document.getElementById("loginResult").innerHTML = `
      Login efetuado com sucesso.<br>
      <strong>User ID:</strong> ${result.user.id}<br>
      <strong>Email:</strong> ${result.user.email}
    `;
  } else {
    document.getElementById("loginResult").innerText = JSON.stringify(result);
  }
}

async function createTask() {
  const data = {
    userId: document.getElementById("userId").value,
    title: document.getElementById("title").value,
    description: document.getElementById("description").value,
    deadline: document.getElementById("deadline").value,
    status: "pending"
  };

  const res = await fetch(`${API}/tasks`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`
    },
    body: JSON.stringify(data)
  });

  const result = await res.json();
  alert("Tarefa criada: " + JSON.stringify(result));
}

async function listTasks() {
  const res = await fetch(`${API}/tasks`, {
    headers: {
      "Authorization": `Bearer ${token}`
    }
  });

  const tasks = await res.json();
  const div = document.getElementById("tasks");
  div.innerHTML = "";

  if (!Array.isArray(tasks)) {
    div.innerHTML = `<div class="task">Erro: ${JSON.stringify(tasks)}</div>`;
    return;
  }

  if (tasks.length === 0) {
    div.innerHTML = `<div class="task">Não existem tarefas.</div>`;
    return;
  }

  tasks.forEach(task => {
    div.innerHTML += `
      <div class="task">
        <strong>${task.title}</strong><br>
        ${task.description || ""}<br>
        Estado: ${task.status}<br>
        Prazo: ${task.deadline || "Sem prazo"}<br>
        ID: ${task._id}<br>
        <button onclick="deleteTask('${task._id}')">Eliminar Tarefa</button>
      </div>
    `;
  });
}

async function deleteTask(taskId) {
  const res = await fetch(`${API}/tasks/${taskId}`, {
    method: "DELETE",
    headers: {
      "Authorization": `Bearer ${token}`
    }
  });

  const result = await res.json();
  alert("Resultado: " + JSON.stringify(result));
  listTasks();
}

async function deleteUser() {
  const userId = document.getElementById("deleteUserId").value;

  const res = await fetch(`${API}/users/${userId}`, {
    method: "DELETE",
    headers: {
      "Authorization": `Bearer ${token}`
    }
  });

  const result = await res.json();
  alert("Resultado: " + JSON.stringify(result));
}

async function getNotifications() {
  const userId = document.getElementById("notificationUserId").value;

  const res = await fetch(`${BASE}/notifications/${userId}`);
  const result = await res.json();

  const div = document.getElementById("notifications");
  div.innerHTML = "";

  if (!Array.isArray(result)) {
    div.innerHTML = `<div class="notification">Erro: ${JSON.stringify(result)}</div>`;
    return;
  }

  if (result.length === 0) {
    div.innerHTML = `<div class="notification">Não existem notificações.</div>`;
    return;
  }

  result.forEach(n => {
    div.innerHTML += `
      <div class="notification">
        ${n.message}
      </div>
    `;
  });
}
</script>

</body>
</html>
