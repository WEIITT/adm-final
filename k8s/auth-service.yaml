apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: adm-auth-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: USER_SERVICE_URL
              value: http://user-service:3002
            - name: JWT_SECRET
              value: adm-final-secret
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
  type: ClusterIP
